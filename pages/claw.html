<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8" />
        <link rel="stylesheet" href="../style.css" />
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@400..900&display=swap" rel="stylesheet">
    </head>
    <body>
        <header id="header-placeholder"></header>
        <script src="../header.js"></script>
        <div class="container">
            <div id="clawtalon"><h1>Claw</h1></div>
            <div id="postwindow">
                <form id="post">
                    <textarea id="postcontent" placeholder="Share something to claw..."></textarea>
                    <p class="postcharlimit" id="limit-post">0/300</p>
                    <label id="profileonlyoption">
                        <input type="checkbox" id="profileonly">
                        Profile Only
                    </label>
                    <div id="imagebar">
                        <label class="clawattachment">
                            Image: 
                            <input type="file" id="clawimage" title="Shift-click to paste image instead" accept="image/*">
                        </label>
                        <button id="clearattachment" title="Clear Attachment" type="button">✕</button>
                    </div>
                    <div id="systemandsend">
                        <label for="system">System: </label>
                            <select name="system" id="system">
                                <option value="Rotur Assistant">Rotur Assistant</option>
                            </select>
                        <button type="submit" id="sendpost">Send</button>
                    </div>
                </form>
                <div id="posterrorplaceholder"></div>
            </div>
            <hr class="full-size">
            <div id="feedcontrols">
                <button id="reloadfeed" title="Refresh Feed">⟳</button>
                <label>
                    <input type="checkbox" id="realtime">
                    Update in real time
                </label>
                <label id="feedlabel">
                    View:&emsp;
                    <select name="feedfilter" id="feedfilter">
                        <option value="feed">Recent Posts</option>
                        <option value="top_posts">Top Posts</option>
                        <option value="following_feed">Following</option>
                    </select>
                </label>
            </div>
            <form id="postsearchbar">
                <input type='search' id='postsearchbarinput' placeholder="Search Posts...">
                <button id="postsearch" type="submit" title="Search Posts"><img src='../images/app_icons/lookup.png' width="16" height="16"></button>
                <button id="clearsearch" type="button" title="Clear Search">✕</button>
            </form>
            <div id="feed">
                <ul id="clawfeed">
                    <li class="loadingfeed"><h2>Loading...</h2></li>
                </ul>
            </div>
        </div>
        <div class="overlay" id="overlay">
            <div class="popup"></div>
        </div>
        <script type="module" src="../scripts/claw.js"></script>
        <footer id="footer-placeholder"></footer>
        <script src="../footer.js"></script>
        <template id="clawposttemplate">
            <li id="post-postid" class="clawpostbody">
                <div class='postauthor'>
                    <a href='../pages/lookup.html?user=user'>
                        <img class='clawpfp' src='user' href='../pages/lookup.html?user=user' alt='user' width='32' height='32'>
                        <h2 class="clawpostauthortitle">User</h2>
                    </a>
                    <div class="clawpostactionbar">
                        <button class='repostbtn' title="Repost Post" data-postid='postid'><img src='../images/misc_icons/repost.png' width='24' height='24'></button>
                        <button class='deletebtn' title="Delete Post" data-postid='postid'><img src='../images/misc_icons/delete.png' width='24' height='24'></button>
                    </div>
                </div>
                <p class='postcontent'>Hello, claw!</p>
                <img class='clawattachment' src=''>
                <p class='postmetadata'>Posted from Rotur Assistant on 1/1/1970</p>
                <div class='feedbackbar'>
                    <button class='likebutton' data-postid='postid'>Like</button>
                    <button class='viewlikes' data-postid='postid'>View Likes</button>
                    <button class='copypostid' data-postid='postid'>Copy Post ID</button>
                </div>
                <details class='repliesbtn' data-postid='postid'>
                <summary class='replydropdownlabel'>View Replies (0)</summary>
                    <div class='repliesplaceholder'>
                        <ul class='reply' id='replies-postid'></ul>
                    </div>
                    <div class='replyboxplaceholder'>
                        <textarea class='replybox' data-postid='postid' placeholder='Add a reply for User' name='userclawpostreplybox'></textarea>
                        <p class="postcharlimit" id="limit-id">0/300</p>
                        <button class='sendreply' data-postid='postid'>Send</button>
                        <h2>Sign in to add a reply</h2>
                    </div>
                    <div class='replyerrorplaceholder'></div>
                </details>
            </li>
        </template>
        <template id="clawreplytemplate">
            <li>
                <div class='postauthor'>
                    <a href='../pages/lookup.html?user=User'>
                        <img class='clawpfp' src='https://avatars.rotur.dev/User' alt='User' width='32' height='32'>
                        <h2 class="clawreplyauthor"></h2>
                    </a>
                    <button class='copypostid' data-postid='replyid'>Copy Reply ID</button>
                </div>
                <p class='postcontent'>Hello User!</p>
                <img class='clawattachment' src=''>
                <p class='postmetadata'>Posted on 1/1/1970</p>
            </li>
        </template>
    </body>
</html>
