<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8" />
        <link rel="stylesheet" href="../style.css" />
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@400..900&display=swap" rel="stylesheet">
    </head>
    <body>
        <div id="header-placeholder"></div>
        <script src="../header.js"></script>
        <div class="container">
            <h1>Rotur Wiki</h1>
            <h2>Your guide to the Rotur Ecosystem</h2>
            <div class="appgrid">
                <ul>
                    <li id="rotur" class="appgridbtn"><img src="../images/wiki_icons/rotur.png" width="80" height="80">Rotur</li>
                    <li id="rtr_accounts" class="appgridbtn"><img src="../images/misc_icons/usericon.png" width="80" height="80">Rotur Accounts</li>
                    <li id="smp" class="appgridbtn"><img src="../images/wiki_icons/smp.png" width="80" height="80">Rotur SMP</li>
                    <li id="systems" class="appgridbtn"><img src="../images/wiki_icons/systems.png" width="80" height="80">Systems</li>
                    <li id="economy" class="appgridbtn"><img src="../images/wiki_icons/economy.png" width="80" height="80">Rotur Economy</li>
                    <li id="origin" class="appgridbtn"><img src="../images/wiki_icons/origin.png" width="80" height="80">originOS</li>
                    <li id="wiki_claw" class="appgridbtn"><img src="../images/app_icons/claw.png" width="80" height="80">Claw</li>
                    <li id="originchats" class="appgridbtn"><img src="../images/app_icons/originchats.png" width="80" height="80">originChats</li>
                    <li id="subscription" class="appgridbtn"><img src="../images/wiki_icons/subscriptions.png" width="80" height="80">Subscriptions</li>
                    <li id="discord" class="appgridbtn"><img src="../images/wiki_icons/discord.png" width="80" height="80">Discord</li>
                    <li id="mistium" class="appgridbtn"><img src="https://avatars.rotur.dev/Mist" width="80" height="80" style="filter: grayscale(100%);">Mistium</li>
                    <li id="fanon" class="appgridbtn"><img src="../images/wiki_icons/origin_fanon.png" width="80" height="80">originOS Fanon</li>
                    <li id="badges" class="appgridbtn"><img src="../images/misc_icons/block.png" width="80" height="80">Badges</li>
                    <li id="abandoned" class="appgridbtn"><img src="../images/wiki_icons/abandoned.png" width="70" height="70">Abandoned Features</li>
                    <li id="discontinued" class="appgridbtn"><img src="../images/misc_icons/delete.png" width="70" height="70">Discontinued Features</li>
                </ul>
            </div>
        </div>
        <script src="../scripts/wiki.js"></script>
        <div id="footer-placeholder"></div>
        <script src="../footer.js"></script>
    </body>
</html>
