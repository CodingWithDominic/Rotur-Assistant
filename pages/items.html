<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8" />
        <link rel="stylesheet" href="../style.css" />
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@400..900&display=swap" rel="stylesheet">
    </head>
    <body>
        <header id="header-placeholder"></header>
        <script src="../header.js"></script>
        <div class="container">
            <h1 style="margin-bottom: 0;">Item Manager</h1>
            <hr class="full-size" style="margin-bottom: 0;">
            <div id="itemmanagerheader">
                <button class="itemmantab" id="items_mine" style="border-bottom: 2px solid white;" data-tabidx="0">Mine</button>
                <button class="itemmantab" id="items_selling" data-tabidx="1">Selling</button>
                <button class="itemmantab" id="items_create" data-tabidx="2">Create</button>
                <button class="itemmantab" id="items_lookup" data-tabidx="3">Lookup</button>
            </div>
            <div id="myitems" class="itemmanpage"><h2>Loading...</h2></div>
            <div id="item_marketplace" class="itemmanpage" style="display: none;">
                <label id="itemsortlabel">
                    Sort by: 
                    <select id="itemsortselect">
                        <option value="newest" selected>Newest to Oldest</option>
                        <option value="oldest">Oldest to Newest</option>
                        <option value="low">Price: Lowest to Highest</option>
                        <option value="high">Price: Highest to Lowest</option>
                    </select>
                </label>
                <div id="itemmarketplaceplaceholder"><h2>Loading...</h2></div>
            </div>
            <form id="create_item" class="itemmanpage" style="display: none;">
                <label class="createitemnamelabel">
                    Name: 
                    <input type="text" id="createitemname" placeholder="Item Name">
                </label>
                <label for="createitemdesc" style="text-align: left;">Description:</label>
                <textarea id="createitemdesc" placeholder="Item Description"></textarea>
                <div id="itempriceandsale">
                    <label>
                        Price:
                        <input type="number" id="createitemprice" placeholder="Price">
                    </label>
                    <label class="putupforsalebox">
                        <input type="checkbox" id="sellitemimmediately">
                        Put up for sale upon creation
                    </label>
                </div>
                <label for="itemjsonmetadata" style="text-align: left;">JSON Metadata (Not visible once created):</label>
                <textarea id="itemjsonmetadata" placeholder="(Optional) Item JSON Metadata"></textarea>
                <button id="finalcreateitem">Create Item</button>
            </form>
            <div id="lookup_item" class="itemmanpage" style="display: none;">
                <form id="itemsearch">
                    <input type="search" id="itemsearchbar" placeholder="Item Name">
                    <button id="itemsearchbtn" type="submit" title="Search for Item"><img src='../images/app_icons/lookup.png' width="16" height="16"></button>
                </form>
                <div id="itemlookupstatusplaceholder"></div>
                <div id="itemlookupplaceholder"></div>
            </div>
        </div>
        <div class="overlay" id="overlay">
            <div class="popup"></div>
        </div>
        <script type="module" src="../scripts/items.js"></script>
        <footer id="footer-placeholder"></footer>
        <script src="../footer.js"></script>
        <template id="itemtemplate">
            <li class='roturitem' id='roturitem_rotur_item'>
                <div class="itemnameheader">
                    <h2>Rotur Item</h2>
                    <button class="itemdeletebtn" title="Delete Item" data-itemname="itemname"><img src="../images/misc_icons/delete.png" width="24" height="24"></button>
                </div>
                <p class='roturitemauthor'>Creator: <img src='https://avatars.rotur.dev/author' width=20 height=20> author | Current Owner: <img src='https://avatars.rotur.dev/owner' width=20 height=20> owner</p>
                <p class="roturitemdesc">itemdesc</p>
                <ul class='itemmetadatar1'>
                    <li>
                        <h3>Price</h3>
                        <p class="roturitemprice">1 RC</p>
                    </li>
                    <li>
                        <h3>Purchaseable</h3>
                        <p class='isitempurchaseable'>Yes</p>
                    </li>
                </ul>
                <ul class='itemmetadatar2'>
                    <li>
                        <h3>Created</h3>
                        <p class="roturitemcreationdate">1/1/1970</p>
                    </li>
                    <li>
                        <h3>Total Revenue</h3>
                        <p class="roturitemtotalrevenue">0</p>
                    </li>
                </ul>
                <button class='buyitem' data-itemname='itemname' data-amt='price' data-owner='user'>Buy (0 RC)</button>
                <div class="itemcontrols">
                    <label>
                        <input type='checkbox' class='isforsale' data-itemname="itemname">
                        For Sale
                    </label>
                    <label>
                        Price:
                        <input type='number' class='updateitemprice' placeholder='Price' name='itempricefield'>
                        <button class='updateitempricebtn' data-itemname="itemname">Update</button>
                    </label>
                    <label>
                        Transfer Ownership:
                        <input type='text' class='itemtransferownership' placeholder='Username' name='potentialnewitemownerfield'>
                        <button class='beginitemtransfer' data-itemname="itemname">Transfer</button>
                    </label>
                </div>
                <details class='itemtransferhistory'>
                    <summary>Transfer History</summary>
                    <ul class='transferhistory'></ul>
                </details>
            </li>
        </template>
    </body>
</html>
