<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8" />
        <link rel="stylesheet" href="../style.css" />
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@400..900&display=swap" rel="stylesheet">
    </head>
    <body>
        <header id="header-placeholder"></header>
        <script src="../header.js"></script>
        <div class="container">
            <div id="rmailpage1">
                <h1>Rmail</h1>
                <button id="compose_rmail">+ Compose</button>
                <hr class="full-size">
                <div id="rmailheader">
                    <button class="rmailtab" id="rmail_sent" style="border-bottom: 2px solid white;">Sent</button>
                    <button class="rmailtab" id="rmail_received">Received</button>
                </div>
                <div id="rmailsenttab" style="display: block;">
                    <ul id="sentrmailslist">
                        <h2>Loading...</h2>
                    </ul>
                </div>
                <div id="rmailreceivedtab" style="display: none;">
                    <ul id="receivedrmailslist">
                        <h2>Loading...</h2>
                    </ul>
                </div>
            </div>
            <div id="rmailpage2" style="display: none;">
                <div id="rmailcontainerheader">
                    <button id="rmail_goback">&larr; Back</button>
                    <div id="rmailactionbarbuttons">
                        <button class='rmailreply' title="Reply to Rmail" id='viewrmailreply' data-payloadidx='1' data-rmailtitle="place" data-rmailauthor="holder">&larrhk;</button>
                        <button class='rmaildelete' title="Delete Rmail from feed" id='viewrmaildelete' data-payloadidx='1'><img src='../images/misc_icons/delete.png' width=24 height=24></button>
                    </div>
                </div>
                <hr class="full-size">
                <div id="rmail_author">
                    <a id="author_href" href="lookup.html?user=Spectator">
                        <img id='viewrmailauthorpfp' src="https://avatars.rotur.dev/.banned_user" width="40" height="40" alt="placeholder">
                        <h3 id="viewrmailauthortext">Author</h3>
                    </a>
                    <div class="toandtimestamp">
                        <div class="viewrmailrecipientinfo">
                            <p>To: </p>
                            <a id="recipient_href" href="lookup.html?user=Spectator">
                                <img id="viewrmailrecipientpfp" src='https://avatars.rotur.dev/.banned_user' width=24 height=24 alt='placeholder'>
                                <p id="viewrmailrecipient">Lorem Ipsum</p>
                            </a>
                        </div>
                        <p class="rmailpreviewtimestamp" id="viewrmailtimestamp">1/1/2026</p>
                    </div>
                </div>
                <hr class="full-size dotted_separator">
                <div id="viewrmailtitle">
                    <h2 id="viewrmailtitletext">Rmail Title</h2>
                </div>
                <div id="viewrmailbody">
                    <p id="viewrmailbodytext">Lorem Ipsum</p>
                    <div id="rmailimageplaceholder" style="display: none;"></div>
                </div>
            </div>
            <div id="rmailpage3" style="display: none;">
                <h1>Compose Rmail</h1>
                <button id="rmail_goback2">&larr; Back</button>
                <hr class="full-size">
                <form id="rmailcompositionbox">
                    <label class="compositiontitle">
                        To: 
                        <input type="text" placeholder="Recipient" id="rmail_comp_receipient">
                    </label>
                    <label class="compositiontitle">
                        Title: 
                        <input type="text" placeholder="Title" id="rmail_comp_title">
                    </label>
                    <label for="rmail_comp_body" class="rmailcompbodylabel">Body: </label>
                    <textarea id="rmail_comp_body" placeholder="Content"></textarea>
                    <div id="imagebar">
                        <label class="rmailattachment">
                            Image(s) (Optional): 
                            <input type="file" id="rmailimage" title="Shift-click to paste image instead" accept="image/*" multiple>
                        </label>
                        <button id="clearattachment" title="Clear Attachments" type="button">✕</button>
                    </div>
                    <p class="fineprint" id="rmailimagefineprint">*Images will only be visible to other Rotur Assistant users using version 1.1 or higher, or orion users</p>
                    <button id="send_rmail">Send &rarr;</button>
                </form>
            </div>
        </div>
        <div class="overlay" id="overlay">
            <div class="popup">
            </div>
        </div>
        <script type="module" src="../scripts/rmail.js"></script>
        <footer id="footer-placeholder"></footer>
        <script src="../footer.js"></script>
        <template id="rmailcard">
            <li class='rmailpreview' data-payloadidx='1'>
                <div class='rmailauthorheader'>
                    <img class='authorpfp' src='https://avatars.rotur.dev/Sender' width=40 height=40 alt='Sender'>
                    <h2>User 1</h2>
                    <div class='rmailtorecipient'>
                        <p>To: </p>
                        <img class="recipientpfp" src='https://avatars.rotur.dev/Recipient' width=24 height=24 alt='Recipient'>
                        <p class="rmailto">User 2</p>
                    </div>
                </div>
                <div class='rmailpreviewbody'>
                    <h3>Title</h3>
                </div>
                <div class='rmailactionbuttons'>
                    <button class='rmailreply' title="Reply to Rmail" data-payloadidx='1' data-rmailtitle='Title' data-rmailauthor='User 1'>&larrhk;</button>
                    <button class='rmaildelete' title="Delete Rmail from feed" data-payloadidx='1'><img src='../images/misc_icons/delete.png' width=24 height=24></button>
                </div>
                <p class='rmailpreviewtimestamp'>Timestamp</p>
            </li>
        </template>
    </body>
</html>
